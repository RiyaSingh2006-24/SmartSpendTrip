services:
  - type: web
    name: smartspendtrip-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DEMO_MODE
        value: true
      - key: AUTH_SECRET
        generateValue: true
      - key: FRONTEND_BASE_URL
        value: https://smart-spend-trip.vercel.app
      - key: CORS_ORIGIN
        value: https://smart-spend-trip.vercel.app,https://riyasingh2006-24.github.io
      - key: CORS_ORIGIN_PATTERNS
        value: https://*.vercel.app
      - key: MONGO_URI
        sync: false
      - key: DEFAULT_COUNTRY_CODE
        value: IN
      - key: OPENAI_MODEL
        value: gpt-4.1
      - key: OPENAI_API_KEY
        sync: false
      - key: FOURSQUARE_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
